name: Keep Render APIs Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Lexicool API 1 with check_guess
        run: |
          set -e
          url="https://api-lexicool.onrender.com/api/check_guess"
          payload='{"guess":"chat"}'

          echo "Waking API 1: $url"

          for i in 1 2 3 4; do
            echo "Attempt $i/4..."
            code=$(curl -sS -m 45 \
              -o /dev/null \
              -w "%{http_code}" \
              -X POST "$url" \
              -H "Content-Type: application/json" \
              -d "$payload" || true)

            echo "API 1 HTTP $code"

            if [ "$code" = "200" ] || [ "$code" = "404" ]; then
              echo "API 1 is awake ✅"
              exit 0
            fi

            sleep 15
          done

          echo "API 1 did not wake up in time ❌"
          exit 1

      - name: Wake Lexicool API 2 with mot/check_guess
        run: |
          set -e
          url="https://api-lexicool2.onrender.com/mot/check_guess"
          payload='{"form":"chat"}'

          echo "Waking API 2: $url"

          for i in 1 2 3 4; do
            echo "Attempt $i/4..."
            code=$(curl -sS -m 45 \
              -o /dev/null \
              -w "%{http_code}" \
              -X POST "$url" \
              -H "Content-Type: application/json" \
              -d "$payload" || true)

            echo "API 2 HTTP $code"

            if [ "$code" = "200" ] || [ "$code" = "404" ]; then
              echo "API 2 is awake ✅"
              exit 0
            fi

            sleep 15
          done

          echo "API 2 did not wake up in time ❌"
          exit 1
